<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KORIQO — E-Commerce Pre-Launch Plan</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink:        #0E1714;
    --ink-soft:   #2A332F;
    --paper:      #F5F1E8;
    --paper-2:    #EDE7D9;
    --line:       #1A1A1A;
    --green:      #1E5F3F;
    --green-deep: #0F3D27;
    --green-soft: #DCE6D9;
    --coral:      #D85A3C;
    --coral-soft: #F4DAD0;
    --gold:       #D9A521;
    --gold-soft:  #F5E5B7;
    --teal:       #2A6B6B;
    --slate:      #5A6660;
    --muted:      #8A938D;
  }
  html { font-size: 16px; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; width: 100%; }

  .grain { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes drawLine { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(216,90,60,0.35); } 50% { box-shadow: 0 0 0 14px rgba(216,90,60,0); } }
  .a-up { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .a-in { animation: fadeIn 0.8s ease both; }
  .a-scale { animation: scaleIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .a-right { animation: slideRight 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .a-line { animation: drawLine 0.9s cubic-bezier(0.22, 1, 0.36, 1) both; transform-origin: left; }
  .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.2s; } .d3 { animation-delay: 0.32s; }
  .d4 { animation-delay: 0.45s; } .d5 { animation-delay: 0.58s; } .d6 { animation-delay: 0.72s; }
  .d7 { animation-delay: 0.86s; } .d8 { animation-delay: 1.0s; } .d9 { animation-delay: 1.15s; }

  .slide { position: absolute; inset: 0; padding: 56px 72px 92px; overflow-y: auto; }
  .slide-inner { max-width: 1240px; width: 100%; margin: 0 auto; }
  @media (max-width: 900px) { .slide { padding: 36px 28px 88px; } }

  /* KORIQO wordmark — bold sans with the underlined-Q hook */
  .logo {
    font-family: 'Archivo Black', sans-serif;
    letter-spacing: 0.02em;
    display: inline-flex; align-items: baseline;
    line-height: 0.9;
  }
  .logo .qbox {
    position: relative; display: inline-block;
  }
  .logo .qbox::after {
    content: ''; position: absolute; left: 8%; right: 8%;
    bottom: -8%; height: 0.12em;
    background: currentColor;
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--green); margin-bottom: 18px;
  }
  .eyebrow::before {
    content: ''; width: 26px; height: 2px; background: var(--green);
  }
  .eyebrow.coral { color: var(--coral); } .eyebrow.coral::before { background: var(--coral); }
  .eyebrow.ink { color: var(--ink); } .eyebrow.ink::before { background: var(--ink); }

  h1.display, h2.display, h3.display {
    font-family: 'Archivo Black', sans-serif;
    letter-spacing: 0.005em;
    line-height: 1.02;
    color: var(--ink);
  }
  h1.display { font-size: clamp(2.6rem, 5.4vw, 4.6rem); }
  h2.display { font-size: clamp(2rem, 3.8vw, 3.1rem); }
  h3.display { font-size: clamp(1.2rem, 1.6vw, 1.4rem); }

  .lede { font-size: clamp(1rem, 1.3vw, 1.18rem); line-height: 1.6; color: var(--ink-soft); max-width: 780px; }
  .small { font-size: 0.82rem; color: var(--slate); }

  /* Nav rail */
  .navbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: linear-gradient(180deg, transparent, rgba(245,241,232,0.95) 35%);
    backdrop-filter: blur(6px);
  }
  .nav-left, .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: all 0.2s ease;
  }
  .nav-btn:hover:not(:disabled) { background: var(--green-deep); transform: translateY(-1px); }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-counter {
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
    color: var(--ink); font-weight: 500;
    letter-spacing: 0.1em;
  }
  .nav-dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(14,23,20,0.18); border: none; cursor: pointer;
    transition: all 0.25s ease; padding: 0;
  }
  .dot:hover { background: rgba(14,23,20,0.45); transform: scale(1.2); }
  .dot.active { background: var(--coral); width: 22px; border-radius: 4px; }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }
  .progress {
    position: fixed; top: 0; left: 0; height: 3px; background: var(--coral);
    z-index: 40; transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Cards & components */
  .card {
    background: #fff; border: 1px solid rgba(14,23,20,0.08);
    border-radius: 14px; padding: 24px;
    transition: all 0.3s ease;
  }
  .card:hover { border-color: var(--ink); transform: translateY(-3px); box-shadow: 0 14px 40px -10px rgba(14,23,20,0.18); }
  .card.dark { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .card.dark:hover { transform: translateY(-3px); }
  .card.green { background: var(--green-deep); color: #fff; border-color: var(--green-deep); }
  .card.coral { background: var(--coral); color: #fff; border-color: var(--coral); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 99px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .pill.green { background: var(--green-soft); color: var(--green-deep); }
  .pill.coral { background: var(--coral-soft); color: var(--coral); }
  .pill.gold  { background: var(--gold-soft); color: #7A5A0E; }
  .pill.ink   { background: rgba(14,23,20,0.08); color: var(--ink); }
  .pill.line  { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .pill .dot-i { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .stat {
    border-left: 3px solid var(--coral);
    padding: 6px 0 6px 18px;
  }
  .stat-num { font-family: 'Archivo Black', sans-serif; font-size: clamp(2.4rem, 4vw, 3.6rem); line-height: 1; color: var(--ink); }
  .stat-label { font-size: 0.82rem; color: var(--slate); margin-top: 6px; line-height: 1.4; }

  /* Cover layout — bold word + floral SVG */
  .cover {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 24px;
    height: 100%;
    align-items: stretch;
  }
  .cover-left {
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .cover-right {
    background: var(--green-deep);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    min-height: 380px;
  }
  @media (max-width: 900px) { .cover { grid-template-columns: 1fr; } }

  /* Persona grid */
  .persona-grid {
    display: grid; grid-template-columns: 280px 1fr; gap: 20px; min-height: 420px;
  }
  .persona-list { display: flex; flex-direction: column; gap: 6px; max-height: 480px; overflow-y: auto; padding-right: 6px; }
  .persona-list::-webkit-scrollbar { width: 4px; }
  .persona-list::-webkit-scrollbar-thumb { background: rgba(14,23,20,0.15); border-radius: 2px; }
  .persona-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    cursor: pointer; transition: all 0.2s ease;
    background: transparent; border: 1px solid transparent;
    text-align: left;
  }
  .persona-row:hover { background: #fff; border-color: rgba(14,23,20,0.08); }
  .persona-row.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .persona-row.active .p-sub { color: rgba(245,241,232,0.7); }
  .p-letter {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center;
    font-family: 'Archivo Black', sans-serif; font-size: 0.95rem;
    background: var(--coral); color: #fff;
    flex-shrink: 0;
  }
  .persona-row.active .p-letter { background: var(--gold); color: var(--ink); }
  .p-name { font-weight: 700; font-size: 0.95rem; }
  .p-sub { font-size: 0.75rem; color: var(--slate); }
  .persona-detail {
    background: #fff; border-radius: 16px; padding: 32px;
    border: 1px solid rgba(14,23,20,0.08);
    display: flex; flex-direction: column; gap: 18px;
    min-height: 420px;
  }
  @media (max-width: 900px) {
    .persona-grid { grid-template-columns: 1fr; }
    .persona-list { max-height: 200px; }
  }

  /* Skill repo viewer */
  .repo-shell {
    background: #fff; border: 1px solid rgba(14,23,20,0.12);
    border-radius: 14px; overflow: hidden;
  }
  .repo-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    background: var(--ink); color: var(--paper);
    font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
  }
  .repo-dot { width: 10px; height: 10px; border-radius: 50%; }
  .repo-bar { display: flex; gap: 6px; margin-right: 12px; }
  .repo-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px; background: rgba(14,23,20,0.08);
  }
  .repo-cell {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.83rem; color: var(--ink);
    transition: background 0.2s ease;
  }
  .repo-cell:hover { background: var(--paper-2); }
  .repo-cell .icon-dir {
    width: 18px; height: 14px; border-radius: 2px;
    background: var(--gold); flex-shrink: 0; position: relative;
  }
  .repo-cell .icon-dir::before {
    content: ''; position: absolute; left: 0; top: -3px;
    width: 8px; height: 4px; background: var(--gold); border-radius: 2px 2px 0 0;
  }

  /* Storefront columns */
  .channel {
    background: #fff; border: 1px solid rgba(14,23,20,0.08);
    border-radius: 14px; padding: 28px; min-height: 320px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
  }
  .channel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--coral);
  }
  .channel.shopify::before { background: var(--green); }
  .channel.tiktok::before  { background: var(--ink); }
  .channel.amazon::before  { background: var(--gold); }
  .channel:hover { border-color: var(--ink); transform: translateY(-4px); box-shadow: 0 18px 50px -12px rgba(14,23,20,0.18); }
  .channel-head {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.5rem;
  }

  /* Asks block */
  .ask {
    background: #fff; border: 2px solid var(--ink);
    border-radius: 18px; padding: 36px;
    position: relative; overflow: hidden;
    transition: all 0.3s ease;
  }
  .ask::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 60%, var(--coral-soft));
    opacity: 0; transition: opacity 0.4s ease;
  }
  .ask:hover { transform: translateY(-4px); box-shadow: 0 24px 60px -16px rgba(14,23,20,0.25); }
  .ask:hover::before { opacity: 1; }
  .ask-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 4rem; line-height: 0.9;
    color: var(--coral); position: relative;
  }
  .ask-content { position: relative; z-index: 1; }

  /* Capability grid */
  .cap-card {
    background: #fff; border: 1px solid rgba(14,23,20,0.08);
    border-radius: 12px; padding: 22px;
    display: flex; gap: 14px;
    transition: all 0.3s ease;
  }
  .cap-card:hover { border-color: var(--ink); transform: translateY(-2px); }
  .cap-num {
    width: 32px; height: 32px; border-radius: 8px;
    display: grid; place-items: center;
    background: var(--ink); color: var(--paper);
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 600;
    flex-shrink: 0;
  }

  /* Team table */
  .team-table {
    width: 100%; border-collapse: collapse;
    background: #fff; border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(14,23,20,0.08);
  }
  .team-table th, .team-table td {
    padding: 16px 22px; text-align: left;
    border-bottom: 1px solid rgba(14,23,20,0.06);
  }
  .team-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--slate);
    background: var(--paper-2);
    font-weight: 500;
  }
  .team-table tbody tr:last-child td { border-bottom: none; }
  .team-table tbody tr { transition: background 0.2s ease; }
  .team-table tbody tr:hover { background: var(--paper); }
  .team-name { font-family: 'Archivo Black', sans-serif; font-size: 1rem; }

  /* Closing */
  .close {
    background: var(--ink);
    color: var(--paper);
    border-radius: 18px;
    padding: 60px 56px;
    height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  .close .floral-bg {
    position: absolute; right: -80px; top: -40px; opacity: 0.4;
  }

  /* Topbar logo */
  .top-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.05rem; letter-spacing: 0.04em;
    color: var(--ink); display: inline-flex; align-items: baseline;
  }
  .top-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; color: var(--slate); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Hero floral SVG sizing */
  .floral-mark { display: block; width: 100%; height: 100%; }

  /* Highlight block */
  .quote {
    border-left: 4px solid var(--coral);
    padding: 6px 0 6px 22px;
    font-size: clamp(1.2rem, 2vw, 1.7rem); line-height: 1.35;
    font-family: 'Inter', sans-serif; font-weight: 600;
    color: var(--ink);
    max-width: 820px;
  }

  /* Bullet list */
  ul.bullets { list-style: none; padding: 0; }
  ul.bullets li {
    position: relative; padding-left: 22px; margin-bottom: 10px;
    font-size: 0.96rem; line-height: 1.55; color: var(--ink-soft);
  }
  ul.bullets li::before {
    content: ''; position: absolute; left: 0; top: 0.55em;
    width: 12px; height: 2px; background: var(--coral);
  }

  /* Help overlay */
  .help-key {
    font-family: 'JetBrains Mono', monospace;
    background: var(--ink); color: var(--paper);
    padding: 2px 8px; border-radius: 4px;
    font-size: 0.72rem; margin: 0 4px;
  }

  /* Scroll cue */
  @media (max-height: 720px) {
    .slide { padding-top: 40px; padding-bottom: 80px; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// -- KORIQO wordmark --
function Wordmark({ size = "1em", color = "currentColor" }) {
  return (
    <span className="logo" style={{ fontSize: size, color }}>
      KORI<span className="qbox">Q</span>O
    </span>
  );
}

// -- Tropical floral SVG (cover and closing) --
function Floral({ palette = "dark" }) {
  const isDark = palette === "dark";
  const leaf1 = isDark ? "#1E5F3F" : "#1E5F3F";
  const leaf2 = isDark ? "#0F3D27" : "#0F3D27";
  const flower = isDark ? "#D9A521" : "#D9A521";
  const accent = isDark ? "#D85A3C" : "#D85A3C";
  const bg = isDark ? "#0F3D27" : "#F5F1E8";
  return (
    <svg className="floral-mark" viewBox="0 0 600 720" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="vig" cx="50%" cy="40%" r="80%">
          <stop offset="0%" stopColor={isDark ? "#1E5F3F" : "#FFF"} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={bg} stopOpacity="1"/>
        </radialGradient>
      </defs>
      <rect width="600" height="720" fill={bg}/>
      <rect width="600" height="720" fill="url(#vig)"/>
      {/* Big leaves — abstract jungle */}
      <g opacity="0.92">
        <path d="M 60 540 Q 130 320 100 120 Q 180 280 220 480 Q 200 580 60 540 Z" fill={leaf1}/>
        <path d="M 100 120 Q 180 280 220 480" stroke={leaf2} strokeWidth="3" fill="none"/>
      </g>
      <g opacity="0.95">
        <path d="M 480 660 Q 360 450 420 200 Q 510 380 540 580 Q 540 660 480 660 Z" fill={accent}/>
        <path d="M 420 200 Q 510 380 540 580" stroke="#7A2E1E" strokeWidth="3" fill="none"/>
      </g>
      <g opacity="0.88">
        <path d="M 280 720 Q 230 540 320 360 Q 360 510 380 700 Q 350 720 280 720 Z" fill={leaf1}/>
        <path d="M 320 360 Q 360 510 380 700" stroke={leaf2} strokeWidth="3" fill="none"/>
      </g>
      <g opacity="0.95">
        <path d="M 380 80 Q 420 220 360 380 Q 320 230 380 80 Z" fill={leaf1}/>
        <path d="M 380 80 Q 420 220 360 380" stroke={leaf2} strokeWidth="2" fill="none"/>
      </g>
      {/* Flowers */}
      <g>
        <circle cx="170" cy="180" r="22" fill={flower}/>
        <circle cx="170" cy="180" r="9" fill="#7A5A0E"/>
        <circle cx="200" cy="160" r="14" fill={flower} opacity="0.85"/>
        <circle cx="145" cy="205" r="12" fill={flower} opacity="0.8"/>
      </g>
      <g>
        <circle cx="450" cy="120" r="26" fill={flower}/>
        <circle cx="450" cy="120" r="10" fill="#7A5A0E"/>
        <circle cx="488" cy="100" r="16" fill={flower} opacity="0.85"/>
        <circle cx="420" cy="145" r="12" fill={flower} opacity="0.85"/>
      </g>
      <g>
        <circle cx="320" cy="500" r="20" fill={flower}/>
        <circle cx="320" cy="500" r="8" fill="#7A5A0E"/>
        <circle cx="345" cy="478" r="11" fill={flower} opacity="0.85"/>
      </g>
      {/* Highlight leaves */}
      <path d="M 300 240 Q 360 160 440 240 Q 380 320 300 240 Z" fill={leaf2} opacity="0.55"/>
      <path d="M 80 380 Q 140 320 180 380 Q 140 440 80 380 Z" fill={leaf2} opacity="0.5"/>
    </svg>
  );
}

// -- Slides --
const SLIDES = [
  { id: "cover",      title: "Cover" },
  { id: "summary",    title: "Executive Summary" },
  { id: "team",       title: "The Team" },
  { id: "capabilities", title: "Capabilities Acquired" },
  { id: "ai",         title: "AI Skill Library" },
  { id: "personas",   title: "8 Audience Segments" },
  { id: "storefronts", title: "Storefronts" },
  { id: "design",     title: "Product & Packaging" },
  { id: "paid",       title: "Paid Media" },
  { id: "ops",        title: "Operations & Scale" },
  { id: "asks",       title: "Asks from Shareholders" },
  { id: "close",      title: "Closing" },
];

// -- Cover slide --
function SlideCover() {
  return (
    <div className="slide-inner cover">
      <div className="cover-left">
        <div className="a-up">
          <div className="eyebrow">Brovon Technology Inc.  ·  Shareholder Briefing</div>
        </div>
        <div>
          <div className="a-up d1">

// -- Slide registry --
const SLIDE_VIEWS = {
  cover:        SlideCover,
  summary:      SlideSummary,
  team:         SlideTeam,
  capabilities: SlideCapabilities,
  ai:           SlideAI,
  personas:     SlidePersonas,
  storefronts:  SlideStorefronts,
  design:       SlideDesign,
  paid:         SlidePaid,
  ops:          SlideOps,
  asks:         SlideAsks,
  close:        SlideClose,
};

// -- App shell --
function App() {
  const [idx, setIdx] = useState(() => {
    const h = parseInt((window.location.hash || "#1").slice(1), 10);
    return Number.isFinite(h) && h >= 1 && h <= SLIDES.length ? h - 1 : 0;
  });
  const total = SLIDES.length;

  useEffect(() => {
    window.location.hash = String(idx + 1);
    document.title = `KORIQO — ${SLIDES[idx].title}`;
  }, [idx]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") {
        e.preventDefault(); setIdx(i => Math.min(total - 1, i + 1));
      }
      if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault(); setIdx(i => Math.max(0, i - 1));
      }
      if (e.key === "Home") setIdx(0);
      if (e.key === "End") setIdx(total - 1);
    };
    const onHash = () => {
      const h = parseInt((window.location.hash || "#1").slice(1), 10);
      if (Number.isFinite(h) && h >= 1 && h <= total) setIdx(h - 1);
    };
    window.addEventListener("keydown", onKey);
    window.addEventListener("hashchange", onHash);
    return () => { window.removeEventListener("keydown", onKey); window.removeEventListener("hashchange", onHash); };
  }, [total]);

  // touch / swipe
  const touchStartX = useRef(null);
  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStartX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 50) {
      if (dx < 0) setIdx(i => Math.min(total - 1, i + 1));
      else setIdx(i => Math.max(0, i - 1));
    }
    touchStartX.current = null;
  };

  const Current = SLIDE_VIEWS[SLIDES[idx].id];
  return (
    <>
      <div className="progress" style={{ width: `${((idx + 1) / total) * 100}%` }}/>
      <div className="topbar">
        <div className="top-logo"><Wordmark size="1.05rem"/></div>
        <div className="top-meta">{SLIDES[idx].title}</div>
      </div>
      <div className="slide" key={idx} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <Current />
      </div>
      <div className="navbar">
        <div className="nav-left">
          <button className="nav-btn" onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0} aria-label="Previous slide">←</button>
          <div className="nav-counter">{String(idx + 1).padStart(2, "0")} / {String(total).padStart(2, "0")}</div>
        </div>
        <div className="nav-dots">
          {SLIDES.map((_, i) => (
            <button key={i}
              className={`dot ${i === idx ? "active" : ""}`}
              onClick={() => setIdx(i)}
              aria-label={`Go to slide ${i + 1}`}/>
          ))}
        </div>
        <div className="nav-right">
          <div className="small" style={{ color: "var(--slate)", fontFamily: "JetBrains Mono, monospace", fontSize: "0.7rem" }}>
            <span className="help-key">←</span><span className="help-key">→</span> navigate
          </div>
          <button className="nav-btn" onClick={() => setIdx(i => Math.min(total - 1, i + 1))} disabled={idx === total - 1} aria-label="Next slide">→</button>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
